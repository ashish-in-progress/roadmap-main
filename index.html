<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineer Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0b0f;
  --s0: #0f0f14;
  --s1: #141419;
  --s2: #1a1a22;
  --bdr: #21212d;
  --bdr2: #2a2a38;
  --text: #dddde8;
  --muted: #5a5a78;
  --muted2: #8888aa;
  --ind: #818cf8;
  --ml: #34d399;
  --llm: #fb923c;
  --gold: #fbbf24;
  --r: 8px;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--font-sans); font-size:15px; line-height:1.6; overflow-x:hidden; }

/* ── PROGRESS BAR ── */
#top-bar { position:fixed; top:0; left:0; right:0; height:2px; background:var(--bdr); z-index:900; }
#top-fill { height:100%; background:linear-gradient(90deg,var(--ind),var(--ml),var(--llm)); width:0; transition:width .5s; }

/* ── SIDE WIDGET ── */
#prog-widget {
  position:fixed; top:1rem; right:1rem; z-index:901;
  background:var(--s1); border:1px solid var(--bdr2);
  border-radius:var(--r); padding:.55rem .9rem;
  display:flex; align-items:center; gap:.75rem;
  font-family:var(--font-mono); font-size:.7rem;
  backdrop-filter:blur(8px);
}
#prog-pct { font-size:1.35rem; font-weight:600; background:linear-gradient(135deg,var(--ind),var(--ml)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
.pw-label { color:var(--muted); font-size:.58rem; letter-spacing:.08em; line-height:1.5; }
.pw-count { color:var(--text); font-size:.75rem; }
#reset-btn { border:1px solid var(--bdr2); background:none; color:var(--muted); font-family:var(--font-mono); font-size:.52rem; letter-spacing:.08em; padding:.2rem .5rem; border-radius:5px; cursor:pointer; transition:all .2s; }
#reset-btn:hover { border-color:#f87171; color:#f87171; }
#sync-btn { border:1px solid var(--bdr2); background:none; color:var(--muted); font-family:var(--font-mono); font-size:.52rem; letter-spacing:.08em; padding:.2rem .5rem; border-radius:5px; cursor:pointer; transition:all .2s; }
#sync-btn:hover { border-color:var(--ind); color:var(--ind); }
#sync-status { font-size:.5rem; color:var(--muted); letter-spacing:.06em; }

/* ── SYNC MODAL ── */
#sync-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
#sync-overlay.open { display:flex; }
#sync-modal {
  background:var(--s1); border:1px solid var(--bdr2);
  border-radius:12px; padding:2rem; width:100%; max-width:400px;
  font-family:var(--font-mono); margin:1rem;
}
.sm-title { font-size:1rem; font-weight:600; color:var(--text); margin-bottom:.4rem; }
.sm-sub { font-size:.7rem; color:var(--muted2); margin-bottom:1.5rem; line-height:1.7; }
.sm-label { font-size:.6rem; letter-spacing:.12em; color:var(--muted); margin-bottom:.4rem; display:block; }
.sm-input {
  width:100%; background:var(--s2); border:1px solid var(--bdr2);
  border-radius:6px; padding:.55rem .85rem; color:var(--text);
  font-family:var(--font-mono); font-size:.82rem; outline:none;
  transition:border-color .2s; margin-bottom:1rem;
}
.sm-input:focus { border-color:var(--ind); }
.sm-row { display:flex; gap:.6rem; margin-bottom:.6rem; }
.sm-btn {
  flex:1; padding:.6rem; border-radius:6px; border:1px solid var(--bdr2);
  font-family:var(--font-mono); font-size:.65rem; letter-spacing:.1em;
  cursor:pointer; transition:all .2s; background:none;
}
.sm-btn-primary { border-color:var(--ind); color:var(--ind); }
.sm-btn-primary:hover { background:rgba(129,140,248,.12); }
.sm-btn-secondary { color:var(--muted); }
.sm-btn-secondary:hover { border-color:var(--muted2); color:var(--muted2); }
.sm-btn-danger { border-color:#f87171; color:#f87171; }
.sm-btn-danger:hover { background:rgba(248,113,113,.08); }
.sm-divider { border:none; border-top:1px solid var(--bdr); margin:1.2rem 0; }
.sm-msg { font-size:.65rem; min-height:1.2rem; margin-top:.5rem; padding:.4rem .7rem; border-radius:5px; display:none; }
.sm-msg.show { display:block; }
.sm-msg.ok { background:rgba(52,211,153,.08); color:#34d399; border:1px solid rgba(52,211,153,.2); }
.sm-msg.err { background:rgba(248,113,113,.08); color:#f87171; border:1px solid rgba(248,113,113,.2); }
.sm-msg.info { background:rgba(129,140,248,.08); color:var(--ind); border:1px solid rgba(129,140,248,.2); }
.sm-user-row { display:flex; align-items:center; gap:.6rem; padding:.5rem .7rem; background:var(--s0); border-radius:6px; border:1px solid var(--bdr); margin-bottom:1rem; }
.sm-user-dot { width:7px; height:7px; border-radius:50%; background:var(--ml); flex-shrink:0; }
.sm-user-name { font-size:.7rem; color:var(--text); flex:1; }
.sm-user-id { font-size:.58rem; color:var(--muted); }

/* ── HERO ── */
.hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:5rem 2rem 3rem; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:600px; height:400px; background:radial-gradient(ellipse,rgba(129,140,248,.07) 0%,transparent 70%); pointer-events:none; }
.hero-eyebrow { font-family:var(--font-mono); font-size:.68rem; letter-spacing:.22em; color:var(--muted); border:1px solid var(--bdr2); padding:.3rem .85rem; border-radius:100px; display:inline-block; margin-bottom:2.5rem; animation:fadeUp .6s .05s both; }
.hero-title { font-family:var(--font-mono); font-size:clamp(2.8rem,9vw,7.5rem); font-weight:600; line-height:.95; letter-spacing:-.02em; animation:fadeUp .6s .1s both; }
.hero-title .t1 { display:block; color:var(--ind); }
.hero-title .t2 { display:block; color:var(--text); }
.hero-title .t3 { display:block; color:var(--ml); }
.hero-sub { margin-top:1.5rem; color:var(--muted2); font-size:.95rem; max-width:460px; line-height:1.7; animation:fadeUp .6s .15s both; }
.hero-schedule { margin-top:2.5rem; display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; animation:fadeUp .6s .2s both; }
.sched-card { background:var(--s1); border:1px solid var(--bdr); border-radius:var(--r); padding:.85rem 1.4rem; text-align:center; }
.sched-day { font-family:var(--font-mono); font-size:.62rem; letter-spacing:.15em; color:var(--muted); margin-bottom:.3rem; }
.sched-time { font-family:var(--font-mono); font-size:.9rem; font-weight:500; color:var(--text); }
.sched-hrs { font-size:.75rem; color:var(--gold); margin-top:.15rem; }
.hero-stats { display:flex; gap:2.5rem; margin-top:2.5rem; flex-wrap:wrap; justify-content:center; animation:fadeUp .6s .25s both; }
.stat-num { font-family:var(--font-mono); font-size:2rem; font-weight:600; line-height:1; }
.stat-lbl { font-family:var(--font-mono); font-size:.58rem; letter-spacing:.15em; color:var(--muted); margin-top:.2rem; }
.scroll-hint { position:absolute; bottom:2rem; left:50%; transform:translateX(-50%); font-family:var(--font-mono); font-size:.58rem; letter-spacing:.2em; color:var(--muted); animation:bob 2s ease-in-out infinite; }
@keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes bob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }

/* ── LAYOUT ── */
.container { max-width:1100px; margin:0 auto; padding:0 1.5rem; }
.section { padding:5rem 0; }
.section + .section { border-top:1px solid var(--bdr); }
.sec-eyebrow { font-family:var(--font-mono); font-size:.62rem; letter-spacing:.2em; color:var(--muted); margin-bottom:.6rem; }
.sec-title { font-family:var(--font-mono); font-size:clamp(1.6rem,4vw,2.8rem); font-weight:600; line-height:1.1; margin-bottom:2rem; }

/* ── TRACKS ── */
.tracks-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
.track-card { background:var(--s1); border:1px solid var(--bdr); border-radius:var(--r); padding:1.6rem; }
.track-icon { font-size:1.5rem; margin-bottom:.9rem; display:block; }
.track-name { font-family:var(--font-mono); font-size:1rem; font-weight:600; margin-bottom:.5rem; }
.track-desc { font-size:.85rem; color:var(--muted2); line-height:1.65; margin-bottom:1rem; }
.chips { display:flex; flex-wrap:wrap; gap:.35rem; }
.chip { font-family:var(--font-mono); font-size:.58rem; letter-spacing:.04em; padding:.18rem .55rem; border-radius:100px; background:var(--s2); border:1px solid var(--bdr2); color:var(--muted2); }

/* ── PHASE PILLS ── */
.phase-bar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
.phase-pill { font-family:var(--font-mono); font-size:.6rem; letter-spacing:.08em; padding:.35rem .9rem; border-radius:100px; background:var(--s1); border:1px solid var(--bdr); color:var(--muted); cursor:pointer; transition:all .2s; }
.phase-pill:hover,.phase-pill.active { background:var(--s2); border-color:var(--ind); color:var(--ind); }

/* ── WEEK ACCORDION ── */
.weeks-list { display:flex; flex-direction:column; gap:.5rem; }
.week-block { border:1px solid var(--bdr); border-radius:var(--r); overflow:hidden; }
.week-head { display:flex; align-items:center; gap:1rem; padding:.85rem 1.2rem; background:var(--s1); cursor:pointer; user-select:none; }
.week-head:hover { background:var(--s2); }
.w-num { font-family:var(--font-mono); font-size:1.1rem; font-weight:600; min-width:3rem; }
.w-theme { font-size:.85rem; color:var(--muted2); flex:1; }
.w-dots { display:flex; gap:2px; }
.w-dot { width:5px; height:5px; border-radius:50%; background:var(--bdr2); transition:background .2s; }
.w-dot.done { background:var(--ind); }
.w-count { font-family:var(--font-mono); font-size:.58rem; color:var(--muted); min-width:2.5rem; text-align:right; }
.w-chevron { color:var(--muted); font-size:.7rem; transition:transform .2s; margin-left:.25rem; }
.week-block.open .w-chevron { transform:rotate(180deg); }
.week-body { display:none; border-top:1px solid var(--bdr); }
.week-block.open .week-body { display:block; }

/* ── COL HEADER ROW ── */
.col-header { display:grid; grid-template-columns:36px 90px 1fr 1fr; background:var(--s0); border-bottom:1px solid var(--bdr); }
.col-h { padding:.55rem 1rem; font-family:var(--font-mono); font-size:.58rem; letter-spacing:.12em; color:var(--muted); }
.col-h:not(:last-child) { border-right:1px solid var(--bdr); }

/* ── SESSION ROWS ── */
.session-wrap { border-bottom:1px solid var(--bdr); }
.session-wrap:last-child { border-bottom:none; }
.session-row { display:grid; grid-template-columns:36px 90px 1fr 1fr; transition:background .15s; }
.session-row:hover { background:rgba(255,255,255,.012); }
.session-row.done { background:rgba(129,140,248,.03); }
.s-check { display:flex; align-items:center; justify-content:center; border-right:1px solid var(--bdr); }
.chk { appearance:none; -webkit-appearance:none; width:15px; height:15px; border:1.5px solid var(--bdr2); border-radius:4px; cursor:pointer; position:relative; transition:all .18s; }
.chk:hover { border-color:var(--ind); }
.chk:checked { background:var(--ind); border-color:var(--ind); }
.chk:checked::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#000; font-size:9px; font-weight:700; line-height:1; }
.s-day { padding:.9rem 1rem; font-family:var(--font-mono); font-size:.62rem; letter-spacing:.08em; color:var(--muted); border-right:1px solid var(--bdr); display:flex; align-items:flex-start; padding-top:.95rem; }
.s-col { padding:.9rem 1rem; font-size:.8rem; line-height:1.55; border-right:1px solid var(--bdr); }
.s-col:last-child { border-right:none; }
.task { padding-left:.85rem; position:relative; color:#c8c8de; padding-bottom:.18rem; line-height:1.55; }
.task::before { content:'›'; position:absolute; left:0; color:var(--ind); font-weight:600; }
.session-row.done .s-day,
.session-row.done .task { opacity:.3; text-decoration:line-through; text-decoration-color:var(--ind); }
.session-row.weekend-row { background:rgba(251,191,36,.014); }
.session-row.weekend-row:hover { background:rgba(251,191,36,.025); }
.session-row.weekend-row.done { background:rgba(129,140,248,.03); }
.res-bar { display:none; padding:.5rem 1rem .5rem calc(36px + 90px + 1rem); background:rgba(251,191,36,.025); border-top:1px dashed rgba(251,191,36,.12); flex-wrap:wrap; gap:.35rem; align-items:center; }
.res-bar.open { display:flex; }
.res-label { font-family:var(--font-mono); font-size:.55rem; letter-spacing:.12em; color:var(--gold); margin-right:.35rem; }
.res-chip { font-family:var(--font-mono); font-size:.6rem; padding:.15rem .5rem; border-radius:100px; background:rgba(251,191,36,.06); border:1px solid rgba(251,191,36,.18); color:#b8900a; }
.res-btn { background:none; border:none; color:var(--muted); font-family:var(--font-mono); font-size:.5rem; letter-spacing:.08em; cursor:pointer; padding:.1rem .4rem; border-radius:3px; transition:color .2s; white-space:nowrap; }
.res-btn:hover { color:var(--gold); }

/* ── PROJECTS ── */
.proj-list { display:flex; flex-direction:column; gap:1rem; }
.proj-card { background:var(--s1); border:1px solid var(--bdr); border-radius:var(--r); overflow:hidden; transition:transform .2s; }
.proj-card:hover { transform:translateY(-2px); }
.proj-inner { display:grid; grid-template-columns:60px 1fr auto; align-items:start; }
.proj-num-col { display:flex; align-items:flex-start; justify-content:center; padding:1.4rem 0; border-right:1px solid var(--bdr); }
.proj-num { font-family:var(--font-mono); font-size:2rem; font-weight:600; line-height:1; }
.proj-body { padding:1.2rem 1.5rem; }
.proj-meta { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; margin-bottom:.35rem; }
.proj-badge { font-family:var(--font-mono); font-size:.55rem; letter-spacing:.12em; padding:.18rem .55rem; border-radius:100px; }
.proj-week { font-family:var(--font-mono); font-size:.55rem; color:var(--muted); letter-spacing:.08em; }
.proj-name { font-family:var(--font-mono); font-size:1.35rem; font-weight:600; line-height:1; margin-bottom:.3rem; }
.proj-stack { font-family:var(--font-mono); font-size:.62rem; color:var(--muted); margin-bottom:.65rem; }
.proj-desc { font-size:.83rem; color:var(--muted2); line-height:1.65; margin-bottom:.7rem; }
.proj-why { background:rgba(251,191,36,.05); border-left:2px solid rgba(251,191,36,.35); padding:.45rem .85rem; border-radius:0 5px 5px 0; font-size:.78rem; color:#b08900; line-height:1.55; font-style:italic; }
.proj-actions { padding:1.2rem 1rem; }
.feat-btn { background:none; border:1px solid var(--bdr2); color:var(--muted); font-family:var(--font-mono); font-size:.55rem; letter-spacing:.08em; padding:.3rem .65rem; border-radius:6px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.feat-btn:hover { border-color:var(--gold); color:var(--gold); }
.proj-features { display:none; padding:.8rem 1.5rem 1.2rem; border-top:1px solid var(--bdr); background:var(--s0); }
.proj-features.open { display:block; }
.feat-title { font-family:var(--font-mono); font-size:.6rem; letter-spacing:.15em; margin-bottom:.55rem; }
.feat-chips { display:flex; flex-wrap:wrap; gap:.35rem; }
.feat-chip { font-family:var(--font-mono); font-size:.6rem; padding:.22rem .6rem; border-radius:100px; background:var(--s2); border:1px solid var(--bdr2); color:var(--muted2); transition:all .2s; }
.feat-chip:hover { background:var(--s1); color:var(--text); }

/* ── BONUS READS ── */
.bonus-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:1rem; }
.bonus-card { background:var(--s1); border:1px solid var(--bdr); border-radius:var(--r); overflow:hidden; transition:transform .2s; position:relative; }
.bonus-card:hover { transform:translateY(-2px); }
.bonus-card.read-done { border-color:rgba(129,140,248,.35); }
.b-read-badge { display:none; position:absolute; top:.8rem; right:.8rem; background:rgba(129,140,248,.12); border:1px solid var(--ind); color:var(--ind); font-family:var(--font-mono); font-size:.5rem; letter-spacing:.1em; padding:.15rem .4rem; border-radius:100px; }
.bonus-card.read-done .b-read-badge { display:block; }
.b-head { padding:1.2rem 1.2rem .8rem; display:flex; gap:.8rem; }
.b-icon { font-size:1.5rem; line-height:1; flex-shrink:0; }
.b-co { font-family:var(--font-mono); font-size:.58rem; letter-spacing:.18em; margin-bottom:.25rem; }
.b-title { font-family:var(--font-mono); font-size:1rem; font-weight:600; line-height:1.2; }
.b-tags { display:flex; flex-wrap:wrap; gap:.3rem; padding:0 1.2rem .8rem; }
.b-tag { font-family:var(--font-mono); font-size:.56rem; letter-spacing:.06em; padding:.15rem .45rem; border-radius:100px; background:var(--s2); color:var(--muted); }
.b-preview { padding:0 1.2rem .8rem; font-size:.8rem; color:var(--muted2); line-height:1.65; border-bottom:1px solid var(--bdr); }
.b-body { display:none; padding:1.2rem; }
.b-body.open { display:block; }
.b-sec-title { font-family:var(--font-mono); font-size:.6rem; letter-spacing:.15em; margin-bottom:.45rem; margin-top:.9rem; }
.b-sec-title:first-child { margin-top:0; }
.b-callout { background:rgba(251,191,36,.05); border-left:2px solid rgba(251,191,36,.35); padding:.5rem .8rem; border-radius:0 5px 5px 0; font-size:.78rem; color:#b08900; line-height:1.55; font-style:italic; margin:.65rem 0; }
.b-text { font-size:.8rem; color:var(--muted2); line-height:1.75; }
.b-step { display:flex; gap:.6rem; margin-bottom:.5rem; align-items:flex-start; }
.b-snum { font-family:var(--font-mono); font-size:.7rem; font-weight:600; flex-shrink:0; min-width:1.5rem; color:var(--muted); }
.b-stxt { font-size:.8rem; color:var(--muted2); line-height:1.6; }
.b-toggle { width:100%; background:none; border:none; border-top:1px solid var(--bdr); color:var(--muted); font-family:var(--font-mono); font-size:.6rem; letter-spacing:.1em; padding:.65rem 1.2rem; cursor:pointer; text-align:left; display:flex; justify-content:space-between; align-items:center; transition:color .2s; }
.b-toggle:hover { color:var(--ind); }
.b-actions { display:flex; gap:.6rem; margin-top:1rem; }
.mark-read-btn { background:rgba(129,140,248,.1); border:1px solid var(--ind); color:var(--ind); font-family:var(--font-mono); font-size:.58rem; letter-spacing:.1em; padding:.4rem .8rem; border-radius:6px; cursor:pointer; transition:all .2s; }
.mark-read-btn:hover { background:rgba(129,140,248,.2); }
.collapse-btn { background:none; border:1px solid var(--bdr2); color:var(--muted); font-family:var(--font-mono); font-size:.58rem; padding:.4rem .8rem; border-radius:6px; cursor:pointer; transition:all .2s; }
.collapse-btn:hover { border-color:var(--muted2); color:var(--muted2); }

/* ── FOOTER ── */
footer { border-top:1px solid var(--bdr); text-align:center; padding:3rem 1.5rem; font-family:var(--font-mono); font-size:.62rem; color:var(--muted); letter-spacing:.1em; }

/* ── RESPONSIVE ── */
@media(max-width:680px) {
  .session-row,.col-header { grid-template-columns:36px 70px 1fr; }
  .s-col:last-child,.col-h:last-child { display:none; }
  .proj-inner { grid-template-columns:48px 1fr auto; }
  .proj-num { font-size:1.5rem; }
  #prog-widget { gap:.4rem; }
}
</style>
</head>
<body>

<div id="top-bar"><div id="top-fill"></div></div>

<div id="prog-widget">
  <div>
    <div id="prog-pct">0%</div>
    <div class="pw-label">DONE</div>
  </div>
  <div>
    <div class="pw-count" id="prog-count">0/0</div>
    <div class="pw-label">SESSIONS</div>
  </div>
  <div>
    <div id="sync-status">NOT SYNCED</div>
    <div class="pw-label">CLOUD</div>
  </div>
  <button id="sync-btn" onclick="openSyncModal()">☁ SYNC</button>
  <button id="reset-btn">RESET</button>
</div>

<!-- ── SYNC MODAL ── -->
<div id="sync-overlay">
  <div id="sync-modal">
    <div id="sm-logged-out">
      <div class="sm-title">Cloud Sync</div>
      <div class="sm-sub">Your progress syncs across every browser and device. Create a profile with a username + PIN, then log in anywhere.</div>

      <div id="sm-create-section">
        <span class="sm-label">CREATE PROFILE</span>
        <input class="sm-input" id="sm-new-user" placeholder="username (e.g. aryan)" maxlength="24" />
        <input class="sm-input" id="sm-new-pin" placeholder="PIN (4–8 digits)" type="password" maxlength="8" />
        <div class="sm-row">
          <button class="sm-btn sm-btn-primary" onclick="createProfile()">CREATE &amp; SYNC</button>
        </div>
      </div>

      <hr class="sm-divider">

      <div id="sm-login-section">
        <span class="sm-label">LOGIN TO EXISTING PROFILE</span>
        <input class="sm-input" id="sm-login-user" placeholder="username" maxlength="24" />
        <input class="sm-input" id="sm-login-pin" placeholder="PIN" type="password" maxlength="8" />
        <div class="sm-row">
          <button class="sm-btn sm-btn-primary" onclick="loginProfile()">LOGIN &amp; LOAD</button>
        </div>
      </div>

      <div class="sm-msg" id="sm-msg-out"></div>
    </div>

    <div id="sm-logged-in" style="display:none">
      <div class="sm-title">Cloud Sync</div>
      <div class="sm-user-row">
        <div class="sm-user-dot"></div>
        <div class="sm-user-name" id="sm-display-name">—</div>
        <div class="sm-user-id">SYNCED</div>
      </div>
      <div class="sm-row">
        <button class="sm-btn sm-btn-primary" onclick="pushSync()">↑ PUSH (save to cloud)</button>
        <button class="sm-btn sm-btn-secondary" onclick="pullSync()">↓ PULL (load from cloud)</button>
      </div>
      <div class="sm-row" style="margin-top:.4rem">
        <button class="sm-btn sm-btn-danger" onclick="logoutProfile()">LOGOUT</button>
      </div>
      <div class="sm-msg" id="sm-msg-in"></div>
    </div>

    <hr class="sm-divider">
    <button class="sm-btn sm-btn-secondary" style="width:100%" onclick="closeSyncModal()">CLOSE</button>
  </div>
</div>

<div id="app"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG + CONSTANTS
═══════════════════════════════════════════════════ */
let CFG;
let TOTAL;
const SK = 'ai_roadmap_v2';
const BK = 'ai_bonus_v2';
const UK = 'ai_sync_user_v2';   // stores { username, pin, binId }

// JSONBin.io — free, no auth required for public bins
// We use a master index bin that maps username → binId
// Each user gets their own bin storing { progress, bonus }
const JBIN_API  = 'https://api.jsonbin.io/v3';
const JBIN_KEY  = '$2a$10$placeholder_replace_with_your_key'; // <-- see instructions below

fetch('./config.json')
  .then(r => r.json())
  .then(cfg => {
    CFG   = cfg;
    TOTAL = CFG.meta.totalSessions;
    init();
    restoreUserBadge();
  });

/* ═══════════════════════════════════════════════════
   LOCAL STORAGE HELPERS
═══════════════════════════════════════════════════ */
function gp()  { try { return JSON.parse(localStorage.getItem(SK))  || {}; } catch { return {}; } }
function sp(d) { localStorage.setItem(SK, JSON.stringify(d)); }
function gb()  { try { return JSON.parse(localStorage.getItem(BK))  || {}; } catch { return {}; } }
function sb(d) { localStorage.setItem(BK, JSON.stringify(d)); }
function gu()  { try { return JSON.parse(localStorage.getItem(UK))  || null; } catch { return null; } }
function su(d) { localStorage.setItem(UK, JSON.stringify(d)); }

/* ═══════════════════════════════════════════════════
   SYNC UI HELPERS
═══════════════════════════════════════════════════ */
function syncUI() {
  const d    = gp();
  const done = Object.values(d).filter(Boolean).length;
  const pct  = Math.round((done / TOTAL) * 100);
  document.getElementById('top-fill').style.width   = pct + '%';
  document.getElementById('prog-pct').textContent   = pct + '%';
  document.getElementById('prog-count').textContent = done + '/' + TOTAL;
}

function setCloudStatus(txt, color) {
  const el = document.getElementById('sync-status');
  el.textContent = txt;
  el.style.color = color || 'var(--muted)';
}

function showMsg(elId, text, type) {
  const el = document.getElementById(elId);
  el.textContent = text;
  el.className   = 'sm-msg show ' + type;
  setTimeout(() => el.classList.remove('show'), 4000);
}

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
function openSyncModal() {
  const u = gu();
  if (u) {
    document.getElementById('sm-logged-out').style.display = 'none';
    document.getElementById('sm-logged-in').style.display  = 'block';
    document.getElementById('sm-display-name').textContent  = u.username;
  } else {
    document.getElementById('sm-logged-out').style.display = 'block';
    document.getElementById('sm-logged-in').style.display  = 'none';
  }
  document.getElementById('sync-overlay').classList.add('open');
}

function closeSyncModal() {
  document.getElementById('sync-overlay').classList.remove('open');
}

document.getElementById('sync-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSyncModal();
});

function restoreUserBadge() {
  const u = gu();
  if (u) setCloudStatus(u.username.toUpperCase(), 'var(--ml)');
}

/* ═══════════════════════════════════════════════════
   JSONBIN HELPERS
═══════════════════════════════════════════════════ */

// Hash function — simple but good enough for PINs stored client-side
async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Create a new bin with initial data, returns binId
async function createBin(data) {
  const r = await fetch(`${JBIN_API}/b`, {
    method:  'POST',
    headers: {
      'Content-Type':    'application/json',
      'X-Master-Key':    JBIN_KEY,
      'X-Bin-Private':   'true',
      'X-Bin-Name':      'ai-roadmap-userdata'
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('Failed to create bin: ' + r.status);
  const j = await r.json();
  return j.metadata.id;
}

// Read a bin
async function readBin(binId) {
  const r = await fetch(`${JBIN_API}/b/${binId}/latest`, {
    headers: { 'X-Master-Key': JBIN_KEY }
  });
  if (!r.ok) throw new Error('Failed to read bin: ' + r.status);
  const j = await r.json();
  return j.record;
}

// Update a bin
async function writeBin(binId, data) {
  const r = await fetch(`${JBIN_API}/b/${binId}`, {
    method:  'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JBIN_KEY
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('Failed to write bin: ' + r.status);
}

// Master index bin: maps username → { binId, pinHash }
// Store YOUR master index bin ID here after first run (see instructions)
const MASTER_BIN_ID = 'REPLACE_WITH_YOUR_MASTER_BIN_ID';

async function readIndex() {
  try {
    return await readBin(MASTER_BIN_ID);
  } catch {
    return {};
  }
}

async function writeIndex(data) {
  await writeBin(MASTER_BIN_ID, data);
}

/* ═══════════════════════════════════════════════════
   CREATE PROFILE
═══════════════════════════════════════════════════ */
async function createProfile() {
  const username = document.getElementById('sm-new-user').value.trim().toLowerCase();
  const pin      = document.getElementById('sm-new-pin').value.trim();

  if (!username || username.length < 2) return showMsg('sm-msg-out', 'Username must be at least 2 characters.', 'err');
  if (!/^\d{4,8}$/.test(pin))           return showMsg('sm-msg-out', 'PIN must be 4–8 digits.', 'err');

  showMsg('sm-msg-out', 'Creating profile...', 'info');

  try {
    const index   = await readIndex();
    if (index[username]) return showMsg('sm-msg-out', 'Username already taken. Choose another.', 'err');

    const pinHash = await hashPin(pin);
    const userData = { progress: gp(), bonus: gb(), username, createdAt: Date.now() };
    const binId    = await createBin(userData);

    index[username] = { binId, pinHash };
    await writeIndex(index);

    su({ username, pinHash, binId });
    setCloudStatus(username.toUpperCase(), 'var(--ml)');
    document.getElementById('sm-display-name').textContent = username;
    document.getElementById('sm-logged-out').style.display = 'none';
    document.getElementById('sm-logged-in').style.display  = 'block';
    showMsg('sm-msg-in', 'Profile created! Progress saved to cloud.', 'ok');
  } catch (e) {
    showMsg('sm-msg-out', 'Error: ' + e.message, 'err');
  }
}

/* ═══════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════ */
async function loginProfile() {
  const username = document.getElementById('sm-login-user').value.trim().toLowerCase();
  const pin      = document.getElementById('sm-login-pin').value.trim();

  if (!username || !pin) return showMsg('sm-msg-out', 'Enter both username and PIN.', 'err');

  showMsg('sm-msg-out', 'Logging in...', 'info');

  try {
    const index   = await readIndex();
    const entry   = index[username];
    if (!entry) return showMsg('sm-msg-out', 'Username not found.', 'err');

    const pinHash = await hashPin(pin);
    if (pinHash !== entry.pinHash) return showMsg('sm-msg-out', 'Wrong PIN.', 'err');

    const data = await readBin(entry.binId);
    if (data.progress) { sp(data.progress); }
    if (data.bonus)    { sb(data.bonus); }

    su({ username, pinHash, binId: entry.binId });
    setCloudStatus(username.toUpperCase(), 'var(--ml)');
    document.getElementById('sm-display-name').textContent = username;
    document.getElementById('sm-logged-out').style.display = 'none';
    document.getElementById('sm-logged-in').style.display  = 'block';

    // Re-render to reflect loaded progress
    document.getElementById('app').innerHTML =
      renderHero() + renderTracks() + renderCurriculum() + renderProjects() + renderBonus() + renderFooter();
    syncUI();
    showMsg('sm-msg-in', 'Loaded your progress from cloud!', 'ok');
  } catch (e) {
    showMsg('sm-msg-out', 'Error: ' + e.message, 'err');
  }
}

/* ═══════════════════════════════════════════════════
   PUSH / PULL
═══════════════════════════════════════════════════ */
async function pushSync() {
  const u = gu();
  if (!u) return showMsg('sm-msg-in', 'Not logged in.', 'err');
  showMsg('sm-msg-in', 'Saving...', 'info');
  try {
    await writeBin(u.binId, { progress: gp(), bonus: gb(), username: u.username, updatedAt: Date.now() });
    showMsg('sm-msg-in', 'Saved to cloud!', 'ok');
    setCloudStatus(u.username.toUpperCase(), 'var(--ml)');
  } catch (e) {
    showMsg('sm-msg-in', 'Save failed: ' + e.message, 'err');
  }
}

async function pullSync() {
  const u = gu();
  if (!u) return showMsg('sm-msg-in', 'Not logged in.', 'err');
  showMsg('sm-msg-in', 'Loading...', 'info');
  try {
    const data = await readBin(u.binId);
    if (data.progress) sp(data.progress);
    if (data.bonus)    sb(data.bonus);
    document.getElementById('app').innerHTML =
      renderHero() + renderTracks() + renderCurriculum() + renderProjects() + renderBonus() + renderFooter();
    syncUI();
    showMsg('sm-msg-in', 'Loaded latest from cloud!', 'ok');
  } catch (e) {
    showMsg('sm-msg-in', 'Load failed: ' + e.message, 'err');
  }
}

/* ═══════════════════════════════════════════════════
   AUTO-SYNC on checkbox change
═══════════════════════════════════════════════════ */
let autoSyncTimer = null;
function scheduleAutoSync() {
  const u = gu();
  if (!u) return;
  clearTimeout(autoSyncTimer);
  setCloudStatus('SAVING...', 'var(--gold)');
  autoSyncTimer = setTimeout(async () => {
    try {
      await writeBin(u.binId, { progress: gp(), bonus: gb(), username: u.username, updatedAt: Date.now() });
      setCloudStatus(u.username.toUpperCase(), 'var(--ml)');
    } catch {
      setCloudStatus('SYNC FAILED', '#f87171');
    }
  }, 1500); // debounce 1.5s after last checkbox click
}

/* ═══════════════════════════════════════════════════
   LOGOUT
═══════════════════════════════════════════════════ */
function logoutProfile() {
  localStorage.removeItem(UK);
  setCloudStatus('NOT SYNCED', 'var(--muted)');
  document.getElementById('sm-logged-out').style.display = 'block';
  document.getElementById('sm-logged-in').style.display  = 'none';
  showMsg('sm-msg-out', 'Logged out. Local progress is still saved.', 'info');
}

/* ═══════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════ */
document.getElementById('reset-btn').onclick = () => {
  if (!confirm('Reset all local progress?')) return;
  localStorage.removeItem(SK);
  localStorage.removeItem(BK);
  document.querySelectorAll('.chk').forEach(c => c.checked = false);
  document.querySelectorAll('.session-row.done').forEach(r => r.classList.remove('done'));
  document.querySelectorAll('.w-dot.done').forEach(d => d.classList.remove('done'));
  document.querySelectorAll('.bonus-card.read-done').forEach(c => c.classList.remove('read-done'));
  syncUI();
};

/* ═══════════════════════════════════════════════════
   RENDER HELPERS (unchanged from original)
═══════════════════════════════════════════════════ */
function phaseColor(wn) {
  for (const ph of CFG.phases) { if (ph.weeks.includes(wn)) return ph.color; }
  return '#818cf8';
}
function renderTasks(arr) {
  if (!arr || !arr.length) return '';
  return arr.map(t => `<div class="task">${escHtml(t)}</div>`).join('');
}
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function weekDots(week, data) {
  return (week.sessions || [])
    .filter(s => s.type === 'weekday' || s.type === 'weekend')
    .map(s => `<div class="w-dot ${data[s.id] ? 'done' : ''}" data-sid="${escHtml(s.id)}"></div>`)
    .join('');
}
function doneCount(week, data) {
  return (week.sessions || []).filter(s => data[s.id]).length;
}

function buildWeekHtml(week) {
  const data     = gp();
  const col      = phaseColor(week.week);
  const sessions = (week.sessions || []).filter(s => s.type === 'weekday' || s.type === 'weekend');
  const dc       = doneCount(week, data);

  const rows = sessions.map(s => {
    const isWeekend = s.type === 'weekend';
    const checked   = data[s.id] ? 'checked' : '';
    const doneClass = data[s.id] ? ' done' : '';
    const wkClass   = isWeekend ? ' weekend-row' : '';
    const resId     = 'res-' + s.id;
    const hasRes    = s.resources && s.resources.length > 0;
    const resHtml   = hasRes ? s.resources.map(r => `<span class="res-chip">${escHtml(r)}</span>`).join('') : '';

    return `
      <div class="session-wrap">
        <div class="session-row${doneClass}${wkClass}" id="row-${escHtml(s.id)}">
          <div class="s-check">
            <input type="checkbox" class="chk" ${checked}
              data-sid="${escHtml(s.id)}" data-week="${week.week}"
              onchange="toggleSession('${escHtml(s.id)}',${week.week},this.checked)">
          </div>
          <div class="s-day">${escHtml(s.day)}</div>
          <div class="s-col">${renderTasks(s.mern)}</div>
          <div class="s-col">
            ${renderTasks(s.ai)}
            ${hasRes ? `<button class="res-btn" onclick="toggleRes('${escHtml(resId)}')">📚 resources</button>` : ''}
          </div>
        </div>
        ${hasRes ? `<div class="res-bar" id="${escHtml(resId)}"><span class="res-label">RESOURCES</span>${resHtml}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="week-block" id="week-${week.week}">
      <div class="week-head" onclick="toggleWeek(${week.week})">
        <span class="w-num" style="color:${col}">W${week.week}</span>
        <span class="w-theme">${escHtml(week.theme)}</span>
        <div class="w-dots" id="dots-${week.week}">${weekDots(week, data)}</div>
        <span class="w-count" id="cnt-${week.week}">${dc}/${sessions.length}</span>
        <span class="w-chevron">▼</span>
      </div>
      <div class="week-body">
        <div class="col-header">
          <div class="col-h"></div>
          <div class="col-h">SESSION</div>
          <div class="col-h" style="color:var(--ind)">MERN + FULL-STACK</div>
          <div class="col-h" style="color:var(--ml)">ML / LLM / AI TRACK</div>
        </div>
        ${rows}
      </div>
    </div>`;
}

function toggleSession(sid, weekNum, checked) {
  const d = gp(); d[sid] = checked; sp(d);
  const row = document.getElementById('row-' + sid);
  if (row) row.classList.toggle('done', checked);
  refreshWeekDots(weekNum);
  syncUI();
  scheduleAutoSync();
}

function refreshWeekDots(weekNum) {
  const week = CFG.weeks.find(w => w.week === weekNum);
  if (!week) return;
  const data     = gp();
  const sessions = (week.sessions || []).filter(s => s.type === 'weekday' || s.type === 'weekend');
  const dotsEl   = document.getElementById('dots-' + weekNum);
  const cntEl    = document.getElementById('cnt-' + weekNum);
  if (dotsEl) dotsEl.innerHTML = weekDots(week, data);
  if (cntEl)  cntEl.textContent = doneCount(week, data) + '/' + sessions.length;
}

function toggleWeek(wn) {
  const block = document.getElementById('week-' + wn);
  if (block) block.classList.toggle('open');
}
function toggleRes(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}
function filterPhase(phaseId, btn) {
  document.querySelectorAll('.phase-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const weeks = phaseId === 'all'
    ? CFG.weeks
    : CFG.weeks.filter(w => { const ph = CFG.phases.find(p => p.id === phaseId); return ph && ph.weeks.includes(w.week); });
  document.getElementById('weeks-container').innerHTML = weeks.map(buildWeekHtml).join('');
}

/* ═══════════════════════════════════════════════════
   RENDER SECTIONS
═══════════════════════════════════════════════════ */
function renderHero() {
  const m = CFG.meta;
  return `
    <div class="hero">
      <div class="hero-eyebrow">${escHtml(m.totalWeeks)}-WEEK ROADMAP — BUILD REAL AI SYSTEMS</div>
      <div class="hero-title">
        <span class="t1">BECOME AN</span>
        <span class="t2">AI</span>
        <span class="t3">ENGINEER</span>
      </div>
      <p class="hero-sub">${escHtml(m.subtitle)}</p>
      <div class="hero-schedule">
        <div class="sched-card">
          <div class="sched-day">${escHtml(m.schedule.weekdays.label)}</div>
          <div class="sched-time">${escHtml(m.schedule.weekdays.hours)}</div>
          <div class="sched-hrs">${m.schedule.weekdays.duration} hrs/day</div>
        </div>
        <div class="sched-card">
          <div class="sched-day">${escHtml(m.schedule.weekend.label)}</div>
          <div class="sched-time">${escHtml(m.schedule.weekend.hours)}</div>
          <div class="sched-hrs">${m.schedule.weekend.duration} hrs/day</div>
        </div>
      </div>
      <div class="hero-stats">
        <div class="stat"><div class="stat-num" style="color:var(--ind)">${m.totalSessions}</div><div class="stat-lbl">SESSIONS</div></div>
        <div class="stat"><div class="stat-num" style="color:var(--gold)">${m.totalWeeks}</div><div class="stat-lbl">WEEKS</div></div>
        <div class="stat"><div class="stat-num" style="color:var(--ml)">${CFG.projects.length}</div><div class="stat-lbl">AI PROJECTS</div></div>
      </div>
      <div class="scroll-hint">↓ scroll</div>
    </div>`;
}

function renderTracks() {
  return `
    <section class="section"><div class="container">
      <div class="sec-eyebrow">// 01 — WHAT YOU WILL MASTER</div>
      <div class="sec-title">Three parallel tracks.</div>
      <div class="tracks-grid">
        ${CFG.tracks.map(t => `
          <div class="track-card" style="border-top:2px solid ${escHtml(t.color)}">
            <span class="track-icon">${t.icon}</span>
            <div class="track-name" style="color:${escHtml(t.color)}">${escHtml(t.label)}</div>
            <p class="track-desc">${escHtml(t.desc)}</p>
            <div class="chips">${t.chips.map(c => `<span class="chip">${escHtml(c)}</span>`).join('')}</div>
          </div>`).join('')}
      </div>
    </div></section>`;
}

function renderCurriculum() {
  const phasePills = `
    <div class="phase-bar">
      <button class="phase-pill active" onclick="filterPhase('all',this)">All weeks</button>
      ${CFG.phases.map(p => `<button class="phase-pill" onclick="filterPhase('${p.id}',this)">${escHtml(p.label)}</button>`).join('')}
    </div>`;
  return `
    <section class="section"><div class="container">
      <div class="sec-eyebrow">// 02 — FULL CURRICULUM</div>
      <div class="sec-title">${CFG.meta.totalWeeks}-week breakdown.</div>
      ${phasePills}
      <div class="weeks-list" id="weeks-container">${CFG.weeks.map(buildWeekHtml).join('')}</div>
    </div></section>`;
}

function renderProjects() {
  const cards = CFG.projects.map(p => {
    const fid = 'pf-' + p.num;
    return `
      <div class="proj-card" style="border-top:2px solid ${escHtml(p.color)}">
        <div class="proj-inner">
          <div class="proj-num-col"><span class="proj-num" style="color:${escHtml(p.color)}">${escHtml(p.num)}</span></div>
          <div class="proj-body">
            <div class="proj-meta">
              <span class="proj-badge" style="background:${p.color}18;color:${escHtml(p.color)};border:1px solid ${p.color}44">${escHtml(p.level)}</span>
              <span class="proj-week">Build in ${escHtml(p.buildWeek)}</span>
            </div>
            <div class="proj-name">${escHtml(p.name)}</div>
            <div class="proj-stack">// ${escHtml(p.stack)}</div>
            <p class="proj-desc">${escHtml(p.desc)}</p>
            <div class="proj-why">${escHtml(p.why)}</div>
          </div>
          <div class="proj-actions"><button class="feat-btn" onclick="toggleFeats('${fid}',this)">features ↓</button></div>
        </div>
        <div class="proj-features" id="${escHtml(fid)}">
          <div class="feat-title" style="color:${escHtml(p.color)}">FEATURES</div>
          <div class="feat-chips">${p.features.map(f => `<span class="feat-chip">${escHtml(f)}</span>`).join('')}</div>
        </div>
      </div>`;
  }).join('');
  return `
    <section class="section"><div class="container">
      <div class="sec-eyebrow">// 03 — BUILD ORDER</div>
      <div class="sec-title">${CFG.projects.length} AI portfolio projects.</div>
      <p style="color:var(--muted2);font-size:.88rem;max-width:480px;margin-bottom:2rem;line-height:1.7;">Each project introduces one new hard AI concept. Your portfolio tells a story of growing capability.</p>
      <div class="proj-list">${cards}</div>
    </div></section>`;
}

function toggleFeats(id, btn) {
  const o = document.getElementById(id).classList.toggle('open');
  btn.textContent = o ? 'features ↑' : 'features ↓';
}

function renderBonus() {
  const bd    = gb();
  const cards = CFG.bonusReads.map(a => {
    const bid    = 'bb-' + a.id;
    const isRead = bd[a.id];
    const secs   = a.sections.map(s => `
      <div>
        <div class="b-sec-title" style="color:${escHtml(s.color)}">${escHtml(s.heading)}</div>
        ${s.callout ? `<div class="b-callout">${escHtml(s.callout)}</div>` : ''}
        ${s.steps   ? s.steps.map((st,i) => `<div class="b-step"><span class="b-snum">${String(i+1).padStart(2,'0')}</span><span class="b-stxt">${escHtml(st)}</span></div>`).join('') : ''}
        ${s.text    ? `<div class="b-text">${escHtml(s.text)}</div>` : ''}
      </div>`).join('');
    return `
      <div class="bonus-card ${isRead ? 'read-done' : ''}" id="bcard-${escHtml(a.id)}">
        <span class="b-read-badge">✓ READ</span>
        <div class="b-head"><div class="b-icon">${a.icon}</div><div><div class="b-co" style="color:${escHtml(a.color)}">${escHtml(a.company)}</div><div class="b-title">${escHtml(a.title)}</div></div></div>
        <div class="b-tags">${a.tags.map(t => `<span class="b-tag">${escHtml(t)}</span>`).join('')}</div>
        <div class="b-preview">${escHtml(a.preview)}</div>
        <div class="b-body" id="${escHtml(bid)}">${secs}
          <div class="b-actions">
            <button class="mark-read-btn" onclick="markRead('${escHtml(a.id)}')">✓ Mark as read</button>
            <button class="collapse-btn"  onclick="toggleBonus('${escHtml(a.id)}')">Collapse ↑</button>
          </div>
        </div>
        <button class="b-toggle" onclick="toggleBonus('${escHtml(a.id)}')"><span>Read deep dive</span><span>↓</span></button>
      </div>`;
  }).join('');
  return `
    <section class="section"><div class="container">
      <div class="sec-eyebrow">// 04 — DEEP DIVES</div>
      <div class="sec-title">How real AI systems work.</div>
      <p style="color:var(--muted2);font-size:.88rem;max-width:480px;margin-bottom:2rem;line-height:1.7;">Engineering decisions made by top AI teams. These make your interview answers unforgettable.</p>
      <div class="bonus-grid">${cards}</div>
    </div></section>`;
}

function toggleBonus(id) {
  const b   = document.getElementById('bb-' + id);
  const btn = document.querySelector(`#bcard-${id} .b-toggle span:last-child`);
  const o   = b.classList.toggle('open');
  if (btn) btn.textContent = o ? '↑' : '↓';
}

function markRead(id) {
  const d = gb(); d[id] = true; sb(d);
  const card = document.getElementById('bcard-' + id);
  if (card) card.classList.add('read-done');
  scheduleAutoSync();
}

function renderFooter() {
  return `<footer>AI ENGINEER ROADMAP &nbsp;·&nbsp; ${CFG.meta.totalWeeks} WEEKS &nbsp;·&nbsp; ${CFG.meta.totalSessions} SESSIONS &nbsp;·&nbsp; BUILD THINGS THAT THINK 🧠<br><br><span style="font-size:.5rem;color:var(--muted)">To update content, edit config.json only. The HTML is a pure renderer.</span></footer>`;
}

function init() {
  document.getElementById('app').innerHTML =
    renderHero() + renderTracks() + renderCurriculum() + renderProjects() + renderBonus() + renderFooter();
  syncUI();
}
</script>
</body>
</html>
